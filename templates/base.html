<!doctype html>
<html lang="pt-BR" data-bs-theme="light">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ page_title or 'Lanchonete' }}</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
    <script>
      (() => {
        const savedTheme = localStorage.getItem("theme");
        const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        const theme = savedTheme || (prefersDark ? "dark" : "light");
        document.documentElement.setAttribute("data-bs-theme", theme);
      })();
    </script>
  </head>
  <body class="app-body">
    <nav class="navbar navbar-expand-lg app-navbar shadow-sm">
      <div class="container-fluid px-3 px-lg-4">
        <a class="navbar-brand fw-semibold text-primary-emphasis" href="{{ url_for('index') }}">Lanchonete</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNav"
          aria-controls="mainNav"
          aria-expanded="false"
          aria-label="Alternar navegacao"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'inicio' %}active{% endif %}" href="{{ url_for('index') }}">Inicio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link {% if active_page == 'pedidos' %}active{% endif %}" href="{{ url_for('pedidos') }}">Pedidos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('index') }}#produtos">Produtos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('index') }}#caixa">Caixa</a>
            </li>
          </ul>
          <button id="theme-toggle" class="btn btn-outline-secondary btn-sm" type="button">
            Tema: Claro
          </button>
        </div>
      </div>
    </nav>
    <main class="container-fluid px-3 px-lg-4 py-4">
      {% block content %}{% endblock %}
    </main>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <script>
      (() => {
        const root = document.documentElement;
        const button = document.getElementById("theme-toggle");
        if (!button) return;

        function updateButton() {
          const current = root.getAttribute("data-bs-theme") || "light";
          button.textContent = current === "dark" ? "Tema: Escuro" : "Tema: Claro";
        }

        button.addEventListener("click", () => {
          const current = root.getAttribute("data-bs-theme") || "light";
          const next = current === "dark" ? "light" : "dark";
          root.setAttribute("data-bs-theme", next);
          localStorage.setItem("theme", next);
          updateButton();
        });

        updateButton();
      })();
    </script>
  </body>
</html>
